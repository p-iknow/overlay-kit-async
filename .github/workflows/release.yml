name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Version PR 생성/업데이트, git tag push
      pull-requests: write  # Version PR 관리
      id-token: write       # npm --provenance (GitHub OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm --filter overlay-kit-async run build

      # .changeset/*.md 존재 시: Version PR 생성/업데이트 (version 모드)
      # .changeset/*.md 없음: pnpm changeset:publish 실행 (publish 모드)
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # provenance는 npm 레지스트리 검증에서 404로 거부되는 이슈가 있어 비활성.
          # 복구하려면 npmjs.com의 Trusted Publisher 설정을 선행한 뒤 아래 라인 재활성.
          # NPM_CONFIG_PROVENANCE: 'true'

      # changesets/action은 `<pkg>@<version>` 태그를 만듭니다.
      # 기존 히스토리 일관성을 위해 `v<version>` 태그도 함께 생성.
      - name: Create v-prefixed git tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(node -p "require('./packages/package.json').version")
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "⏭️ Tag v${VERSION} already exists. Skipping."
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
