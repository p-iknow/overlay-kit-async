name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Package
        run: pnpm --filter overlay-kit-async run build

      - name: Check if version already published
        id: version-check
        run: |
          PACKAGE_NAME=$(node -p "require('./packages/package.json').name")
          LOCAL_VERSION=$(node -p "require('./packages/package.json').version")
          PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}" version 2>/dev/null || echo "none")

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ ${PACKAGE_NAME}@${LOCAL_VERSION} already published. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🚀 Publishing ${PACKAGE_NAME}@${LOCAL_VERSION} (registry has: ${PUBLISHED_VERSION})"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.skip != 'true'
        run: |
          cd packages
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git Tag
        if: steps.version-check.outputs.skip != 'true'
        run: |
          VERSION=$(node -p "require('./packages/package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
